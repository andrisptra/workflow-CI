name: Train and Deploy Model

on:
  push:
    branches: [main]

env:
  CSV_URL: "MLproject/asap2_preprocessing/train_preprocessed.csv"
  TARGET_VAR: "score_label"
  MLFLOW_ALLOW_FILE_STORE: "true"
  MLFLOW_TRACKING_URI: "sqlite:///mlflow.db"

jobs:
  train-and-deploy:
    name: Train and Deploy Model Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ---------------------------------
      # 1. checkout repository
      # ---------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: pull LFS files
        run: |
          git lfs pull
          git lfs track "*.pkl"

      # ---------------------------------
      # set up Python 3.12.7
      # ---------------------------------
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: 3.12.7

      # ---------------------------------
      # 3. check env
      # ---------------------------------
      - name: Check Env
        run: |
          python --version
          pip list
          echo $CSV_URL

      # ---------------------------------
      # 4. install dependencies
      # ---------------------------------
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow
          pip install seaborn
          pip install scikit-optimize

      - name: Debug MLflow
        run: |
          pwd
          ls -la
          echo $MLFLOW_TRACKING_URI
      # ---------------------------------
      # 5. Run Mlflow Project
      # ---------------------------------
      - name: Run MLflow Project
        run: |
          mlflow run MLproject --env-manager=local

      # ---------------------------------
      # 6. get mlflow run id from mlflow output
      # ---------------------------------
      - name: Get Latest MLflow Run ID
        id: get_run_id
        run: |
          # 1. Ambil Run ID dari Python
          OUTPUT_ID=$(python -c "
          import mlflow
          mlflow.set_tracking_uri('sqlite:///mlflow.db')
          client = mlflow.tracking.MlflowClient()
          exp = client.get_experiment_by_name('ASAP2_Essay_Score_Tuning')
          runs = client.search_runs(exp.experiment_id, order_by=['start_time DESC'], max_results=1)
          print(runs[0].info.run_id)
          ")

          # 2. Daftarkan ke environment global GitHub Actions agar bisa dibaca step lain
          echo "MLFLOW_RUN_ID=$OUTPUT_ID" >> $GITHUB_ENV

      # ---------------------------------
      # 8. install python dependencies
      # ---------------------------------
      - name: Install Python Dependencies
        run: |
          pip install mlflow

      # ---------------------------------
      # 9. Upload to LFS
      # ---------------------------------
      - name: Upload Model to LFS
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add .
          git commit -m "Add model from run"
          git push origin main

      # ---------------------------------
      # 10. Build Docker Image
      # ---------------------------------
      - name: Build Docker Image
        run: |
          mlflow models build-docker --model-uri "runs:/${{ env.MLFLOW_RUN_ID }}/model" -n essay-scoring-model

      # ---------------------------------
      # 11. login to Docker Hub
      # ---------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      # ---------------------------------
      # 12. Tag Docker Image
      # ---------------------------------
      - name: Tag Docker Image
        run: |
          docker tag essay-scoring-model:latest ${{ secrets.DOCKER_USERNAME }}/essay-scoring-model:latest

      # ---------------------------------
      # 13. Push Docker Image to Docker Hub
      # ---------------------------------
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/essay-scoring-model:latest
