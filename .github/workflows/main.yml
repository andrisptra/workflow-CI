name: Train and Deploy Model

on:
  push:
    branches: [main]

env:
  CSV_URL: "MLproject/asap2_preprocessing/train_preprocessed.csv"
  TARGET_VAR: "score_label"
  DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
  DAGSHUB_REPO_NAME: ${{ secrets.DAGSHUB_REPO_NAME }}
  MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
  MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_ACCESS_TOKEN }}
  MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/${{ secrets.DAGSHUB_REPO_NAME }}.mlflow

jobs:
  train-and-deploy:
    name: Train and Deploy Model Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ---------------------------------
      # 1. checkout repository
      # ---------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: pull LFS files
        run: git lfs pull

      - name: Validate DagsHub Secrets
        run: |
          if [ -z "$DAGSHUB_USERNAME" ]; then
            echo "DAGSHUB_USERNAME is missing"
            exit 1
          fi
          if [ -z "$DAGSHUB_REPO_NAME" ]; then
            echo "DAGSHUB_REPO_NAME is missing"
            exit 1
          fi
          if [ -z "$MLFLOW_TRACKING_PASSWORD" ]; then
            echo "MLFLOW_TRACKING_PASSWORD is missing"
            exit 1
          fi

      # ---------------------------------
      # set up Python 3.12.7
      # ---------------------------------
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: 3.12.7

      # ---------------------------------
      # 3. check env
      # ---------------------------------
      - name: Check Env
        run: |
          python --version
          pip list
          echo $CSV_URL

      # ---------------------------------
      # 4. install dependencies
      # ---------------------------------
      - name: Install Dependencies
        run: |
          pip install -r MLproject/requirements.txt
          pip install seaborn

      # ---------------------------------
      # 5. Run Mlflow Project
      # ---------------------------------
      - name: Run MLflow Project
        run: |
          mlflow run MLproject --env-manager=local -P dagshub_username=${{ secrets.DAGSHUB_USERNAME }} -P dagshub_repo_name=${{ secrets.DAGSHUB_REPO_NAME }}

      # ---------------------------------
      # 6. get mlflow run id from script output
      # ---------------------------------
      - name: Get Latest MLflow Run ID
        id: get_run_id
        run: |
          RUN_ID=$(cat MLproject/run_id.txt)
          test -n "$RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_ENV
          echo "Latest MLflow Run ID: $RUN_ID"

      # ---------------------------------
      # 8. install python dependencies
      # ---------------------------------
      - name: Install Python Dependencies
        run: |
          pip install mlflow

      # ---------------------------------
      # 9. Upload to LFS
      # ---------------------------------
      - name: Upload Model to LFS
        run: |
          run_id=${{ env.run_id }}
          mlflow artifacts download --run-id $run_id -d model_artifacts
          cd model_artifacts
          git lfs install
          git init
          git remote add origin https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/${{ secrets.DAGSHUB_REPO_NAME }}.git
          git add .
          git commit -m "Add model artifacts from run $run_id"
          git push origin main --force

      # ---------------------------------
      # 10. Build Docker Model
      # ---------------------------------
      - name: Build Docker Model
        run: |
          mlflow models build-docker --model-uri "runs:/${{ env.run_id }}/model" --name "essayScore"

      # ---------------------------------
      # 11. Log in to Docker Hub
      # ---------------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN}}

      # ---------------------------------
      # 12. Tag docker image
      # ---------------------------------
      - name: Tag Docker Image
        run: |
          docker tag essayscore ${{ secrets.DOCKER_USERNAME }}/essayscore:latest

      # ---------------------------------
      # 13. Push Docker Image
      # ---------------------------------
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/essayscore:latest
