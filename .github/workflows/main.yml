name: Train and Deploy Model

on:
  push:
    branches: [main]

env:
  CSV_URL: "MLproject/asap2_preprocessing/train_preprocessed.csv"
  TARGET_VAR: "score_label"

jobs:
  train-and-deploy:
    name: Train and Deploy Model Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ---------------------------------
      # 1. checkout repository
      # ---------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: pull LFS files
        run: git lfs pull

      # ---------------------------------
      # set up Python 3.12.7
      # ---------------------------------
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: 3.12.7

      # ---------------------------------
      # 3. check env
      # ---------------------------------
      - name: Check Env
        run: |
          python --version
          pip list
          echo $CSV_URL

      # ---------------------------------
      # 4. install dependencies
      # ---------------------------------
      - name: Install Dependencies
        run: |
          pip install -r MLproject/requirements.txt
          pip install seaborn

      # ---------------------------------
      # 5. Run Mlflow Project
      # ---------------------------------
      - name: Run MLflow Project
        run: |
          mlflow run MLproject --env-manager=local

      # ---------------------------------
      # 6. get mlflow run id from script output
      # ---------------------------------
      - name: Get Latest MLflow Run ID
        id: get_run_id
        run: |
          RUN_ID=$(cat MLproject/run_id.txt)
          test -n "$RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_ENV
          echo "Latest MLflow Run ID: $RUN_ID"

      # ---------------------------------
      # 8. install python dependencies
      # ---------------------------------
      - name: Install Python Dependencies
        run: |
          pip install mlflow

      # ---------------------------------
      # 9. Upload to LFS
      # ---------------------------------
      - name: Upload Model to LFS
        run: |
          run_id=${{ env.run_id }}
          mlflow artifacts download --run-id $run_id -d model_artifacts
          cd model_artifacts
          git lfs install
          git init
          git remote add origin https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/${{ secrets.DAGSHUB_REPO_NAME }}.git
          git add .
          git commit -m "Add model artifacts from run $run_id"
          git push origin main --force

